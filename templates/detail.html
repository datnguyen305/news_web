{{define "title"}}{{.Title}}{{end}}

{{define "content"}}
<div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
    <header class="mb-8">
        <div class="flex items-center space-x-3 mb-4">
            <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">
                {{.Source}}
            </span>
            <span class="text-gray-400 text-sm">{{.PublishedAt.Format "15:04 - 02/01/2006"}}</span>
        </div>
        <h1 class="text-4xl font-extrabold text-gray-900 leading-tight">{{.Title}}</h1>
    </header>

    {{if .Thumbnail}}
    <div class="mb-10 rounded-2xl overflow-hidden shadow-md">
        <img src="{{.Thumbnail}}" class="w-full h-auto object-cover max-h-[500px]">
    </div>
    {{end}}

    <div class="prose prose-indigo prose-lg max-w-none text-gray-700 leading-relaxed">
        {{/* ĐÂY LÀ DÒNG QUAN TRỌNG NHẤT */}}
        {{.Content}} 
    </div>

    <footer class="mt-12 pt-8 border-t border-gray-100 flex justify-between items-center">
        <a href="/" class="text-gray-500 hover:text-indigo-600 flex items-center text-sm font-medium transition">
            ← Quay lại trang chủ
        </a>
        <a href="{{.Link}}" target="_blank" class="bg-gray-900 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-indigo-600 transition shadow-sm">
            Xem tại nguồn gốc
        </a>
    </footer>
</div>
{{end}}
