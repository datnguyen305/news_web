{{define "layout"}}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}} - Go News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-2xl font-bold text-indigo-600">GO-NEWS</a>
            <div class="space-x-6 hidden md:flex">
                <a href="/" class="hover:text-indigo-600 font-medium">Trang chủ</a>
                <a href="#" class="hover:text-indigo-600 font-medium">Thế giới</a>
                <a href="#" class="hover:text-indigo-600 font-medium">Công nghệ</a>
            </div>
            <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">Đăng nhập</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {{template "content" .}}
    </main>

    <footer class="border-t border-gray-200 bg-white mt-12 py-8">
        <div class="text-center text-gray-500 text-sm">
            &copy; 2026 Go News Project. Build with Golang & Tailwind.
        </div>
    </footer>

    <div class="fixed bottom-6 right-6 z-[100]">
        <button id="chat-toggle" class="bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-full shadow-lg transition-all transform hover:scale-110">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
        </button>

        <div id="chat-window" class="hidden absolute bottom-20 right-0 w-80 md:w-96 bg-white rounded-2xl shadow-2xl border border-gray-100 flex flex-col overflow-hidden transition-all">
            <div class="bg-indigo-600 p-4 text-white font-bold flex justify-between items-center">
                <span>AI Tin Tức (RAG)</span>
                <button id="close-chat" class="text-indigo-200 hover:text-white">&times;</button>
            </div>
            
            <div id="chat-messages" class="h-80 overflow-y-auto p-4 space-y-4 bg-gray-50 text-sm">
                <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 max-w-[85%]">
                    Chào bạn! Tôi đã đọc hết các tin tức mới nhất. Bạn muốn hỏi gì không?
                </div>
            </div>

            <div class="p-4 border-t bg-white">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="Hỏi về tin tức..." class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">Gửi</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Khai báo các phần tử
        const chatToggle = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const closeChat = document.getElementById('close-chat');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        // Hàm hiển thị tin nhắn
        function appendMessage(sender, text, id = '') {
            const div = document.createElement('div');
            if (sender === 'user') {
                div.className = "bg-indigo-100 p-3 rounded-lg shadow-sm border border-indigo-200 max-w-[85%] ml-auto text-indigo-900";
            } else {
                div.className = "bg-white p-3 rounded-lg shadow-sm border border-gray-200 max-w-[85%] text-gray-800";
            }
            if (id) div.id = id;
            div.innerHTML = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Đóng/Mở Chat
        chatToggle.onclick = () => chatWindow.classList.toggle('hidden');
        closeChat.onclick = () => chatWindow.classList.add('hidden');

        // Xử lý gửi form
        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const msg = chatInput.value.trim();
            if (!msg) return;

            appendMessage('user', msg);
            chatInput.value = '';

            const loadingId = 'loading-' + Date.now();
            appendMessage('ai', '<span class="animate-pulse">Đang tìm tin liên quan...</span>', loadingId);

            try {
                const formData = new FormData();
                formData.append('message', msg);

                const response = await fetch('/chat', { method: 'POST', body: formData });
                const data = await response.json();

                const botMsgDiv = document.getElementById(loadingId);
                
                if (!data.articles || data.articles.length === 0) {
                    botMsgDiv.innerText = "Xin lỗi, tôi không tìm thấy bài báo nào liên quan đến câu hỏi của bạn.";
                    return;
                }

                let htmlContent = `<p class="mb-3 font-bold text-gray-700">Đây là các bài báo liên quan:</p>`;
                data.articles.forEach(art => {
                    // Kiểm tra nếu có ảnh thì hiện, không thì ẩn đi hoặc dùng ảnh mặc định
                    const imgHtml = art.image_url 
                        ? `<img src="${art.image_url}" class="w-16 h-16 object-cover rounded-md flex-shrink-0" alt="news">` 
                        : `<div class="w-16 h-16 bg-gray-200 rounded-md flex items-center justify-center text-[10px] text-gray-400">No Img</div>`;

                    htmlContent += `
                        <a href="/detail?id=${art.id}" class="flex gap-3 p-3 mb-2 border border-indigo-100 rounded-lg bg-indigo-50 hover:bg-indigo-100 transition-all group">
                            ${imgHtml}
                            <div class="flex-1 overflow-hidden">
                                <div class="font-semibold text-indigo-700 text-sm group-hover:underline line-clamp-1">${art.title}</div>
                                <div class="text-xs text-gray-500 mt-1 line-clamp-2">${art.snippet}</div>
                            </div>
                        </a>
                    `;
                });
                botMsgDiv.innerHTML = htmlContent;
                chatMessages.scrollTop = chatMessages.scrollHeight;

            } catch (error) {
                const loadingDiv = document.getElementById(loadingId);
                if(loadingDiv) loadingDiv.innerText = "Lỗi kết nối! Vui lòng thử lại sau.";
            }
        };
    </script>
</body>
</html>
{{end}}
